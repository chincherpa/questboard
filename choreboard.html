<html>
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --bg: #111318;
      --bg2: #1a1d24;
      --bg3: #22262f;
      --text: #e8eaf0;
      --text2: #9099a8;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --info-bg: rgba(55,138,221,0.15);
      --info-text: #7ab8f5;
      --info-border: rgba(55,138,221,0.4);
      --success-bg: rgba(99,153,34,0.15);
      --success-text: #8dc447;
      --warning-bg: rgba(186,117,23,0.15);
      --warning-text: #f0a030;
      --danger-bg: rgba(226,75,74,0.15);
      --danger-text: #f07070;
      --radius: 10px;
      --radius-sm: 7px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 0.75rem 1.5rem; }
    .board { max-width: 1280px; margin: 0 auto; }

    /* Header: title + tabs + reset in one row */
    .header { display: flex; align-items: center; gap: 16px; margin-bottom: 0.75rem; }
    .title { font-size: 16px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .tabs { flex: 1; display: flex; gap: 4px; background: var(--bg2); border-radius: var(--radius-sm); padding: 3px; }
    .tab { flex: 1; text-align: center; padding: 7px 0; font-size: 13px; font-weight: 500; border-radius: 5px; cursor: pointer; color: var(--text2); border: none; background: none; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .tab.active { background: var(--bg3); color: var(--text); border: 0.5px solid var(--border); }
    .reset-btn { font-size: 12px; color: var(--text2); background: none; border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; flex-shrink: 0; white-space: nowrap; }
    .reset-btn:hover { background: var(--bg2); }

    /* Players: compact horizontal cards */
    .players { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 0.75rem; }
    .player-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.7rem 1rem; cursor: pointer; transition: border-color 0.15s; display: flex; align-items: center; gap: 12px; }
    .player-card.active { border: 2px solid var(--info-border); }
    .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 15px; flex-shrink: 0; }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .player-pts { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.1; }
    .player-pts-label { font-size: 11px; color: var(--text2); font-weight: 400; }

    /* Chore layout: daily | weekly side by side */
    .chore-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
    .section-label { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .reset-info { font-size: 10px; color: var(--text2); font-weight: 400; text-transform: none; letter-spacing: 0; }
    .chores { display: grid; grid-template-columns: repeat(auto-fit, minmax(128px, 1fr)); gap: 8px; }
    .chore { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px; cursor: pointer; transition: border-color 0.15s; }
    .chore:hover { border-color: var(--border2); }
    .chore.done { opacity: 0.4; pointer-events: none; }
    .chore-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
    .chore-icon { font-size: 18px; color: var(--text2); }
    .pts-badge { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
    .pts-1 { background: var(--success-bg); color: var(--success-text); }
    .pts-2 { background: var(--info-bg); color: var(--info-text); }
    .pts-3 { background: var(--warning-bg); color: var(--warning-text); }
    .pts-5 { background: var(--danger-bg); color: var(--danger-text); }
    .chore-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .chore.done .chore-name { text-decoration: line-through; }
    .done-by { font-size: 11px; color: var(--success-text); margin-top: 3px; display: flex; align-items: center; gap: 4px; }

    /* Rewards */
    .rewards { display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); gap: 10px; }
    .reward { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; cursor: pointer; transition: border-color 0.15s; }
    .reward:hover { border-color: var(--border2); }
    .reward.cant-afford { opacity: 0.35; pointer-events: none; }
    .reward-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .reward-icon { font-size: 20px; color: var(--text2); }
    .cost-badge { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 99px; background: var(--warning-bg); color: var(--warning-text); }
    .reward-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .reward-desc { font-size: 11px; color: var(--text2); }

    /* History */
    .redeemed-list { margin-top: 0.5rem; }
    .redeemed-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--text2); padding: 7px 0; border-bottom: 0.5px solid var(--border); }
    .redeemed-item i { margin-top: 2px; flex-shrink: 0; }
    .redeemed-name { color: var(--text); font-weight: 500; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 10px 20px; font-size: 14px; color: var(--text); opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 99; }
    .toast.show { opacity: 1; }
    .no-select, .empty { font-size: 13px; color: var(--text2); padding: 1rem 0; }

    /* === RPG Battle System === */
    .char-sprite { flex-shrink: 0; }
    .char-sprite svg, .monster-sprite-wrap svg { display: block; image-rendering: pixelated; }
    .monster-section { display: flex; flex-direction: column; align-items: center; gap: 3px; border-left: 1px solid var(--border); padding-left: 10px; min-width: 100px; }
    .monster-section.monster-dead .monster-sprite-wrap { filter: grayscale(1) brightness(0.35); }
    .monster-name { font-family: 'Press Start 2P', monospace; font-size: 7px; color: #ddd; text-align: center; line-height: 1.4; white-space: nowrap; }
    .monster-name.defeated { color: #555; text-decoration: line-through; }
    .hp-text { font-family: 'Press Start 2P', monospace; font-size: 6px; color: #888; }
    .hp-bar-outer { width: 80px; height: 7px; background: #111; border: 1px solid #333; }
    .hp-bar-fill { height: 100%; background: #eee; transition: width 0.3s steps(8); }
    .hp-bar-fill.low { background: #888; }
    .player-card { position: relative; }
    @keyframes dmg-flash { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .dmg-flash { animation: dmg-flash 0.3s ease; }

    '   111111   ','  11111111  ',' 11 11 1111 ',' 1111111111 ',
    '   111111   ','  22221122  ','  22222222  ','  22222222  ',
    '  22222222  ','  11    11  ','  11    11  ',' 111    111 ',
  ], pal: { '1':'#44aa33','2':'#997744' } },

  imp: { rows: [
    '  1      1  ',' 11      11 ','  11111111  ',' 1111221111 ',
    ' 1111111111 ','   111111   ','  11111111  ',' 1111111111 ',
    '11 111111 11','   111111   ','  11  11  1 ','  11  11 11 ',
  ], pal: { '1':'#cc2200','2':'#ffdd00' } },

  scorpion: { rows: [
    '1          1','11    22  11',' 111222211  ','  11222211  ',
    '  11222211  ','  111111111 ',' 111111111  ','  111111111 ',
    ' 1 11   111 ','1 1  1 1  1 ','    111     ','     11     ',
  ], pal: { '1':'#cc8800','2':'#ffcc00' } },
};

const MONSTERS = [
  { id: 'slime',      name: 'Slime',      adultHP: 14, kidHP:  8, atk:  5 },
  { id: 'bat',        name: 'Bat',        adultHP: 15, kidHP:  8, atk:  5 },
  { id: 'drakee',     name: 'Drakee',     adultHP: 14, kidHP:  8, atk:  5 },
  { id: 'imp',        name: 'Imp',        adultHP: 16, kidHP:  9, atk:  6 },
  { id: 'goblin',     name: 'Goblin',     adultHP: 17, kidHP: 10, atk:  8 },
  { id: 'scorpion',   name: 'Scorpion',   adultHP: 18, kidHP: 10, atk:  8 },
  { id: 'ghost',      name: 'Ghost',      adultHP: 18, kidHP: 10, atk:  8 },
  { id: 'zombie',     name: 'Zombie',     adultHP: 19, kidHP: 11, atk:  9 },
  { id: 'skeleton',   name: 'Skeleton',   adultHP: 20, kidHP: 11, atk: 10 },
  { id: 'evil_eye',   name: 'Evil Eye',   adultHP: 20, kidHP: 11, atk: 10 },
  { id: 'wraith',     name: 'Wraith',     adultHP: 21, kidHP: 12, atk: 11 },
  { id: 'wyvern',     name: 'Wyvern',     adultHP: 22, kidHP: 12, atk: 12 },
  { id: 'troll',      name: 'Troll',      adultHP: 23, kidHP: 13, atk: 13 },
  { id: 'golem',      name: 'Golem',      adultHP: 24, kidHP: 13, atk: 14 },
  { id: 'ogre',       name: 'Ogre',       adultHP: 24, kidHP: 13, atk: 14 },
  { id: 'metal_slime',name: 'Metal Slime',adultHP: 25, kidHP: 14, atk: 15 },
  { id: 'dragon',     name: 'Dragon',     adultHP: 28, kidHP: 15, atk: 15 },
];

function spriteHTML(sprite, scale) {
  const rows = sprite.rows, pal = sprite.pal;
  const w = rows[0].length * scale, h = rows.length * scale;
  let r = '';
  rows.forEach((row, y) => [...row].forEach((px, x) => {
    const c = pal[px]; if (c) r += `<rect x="${x*scale}" y="${y*scale}" width="${scale}" height="${scale}" fill="${c}"/>`;
  }));
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">${r}</svg>`;
}

function dateSeededMonster(pid, dateKey) {
  const hash = dateKey.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const m = MONSTERS[hash % MONSTERS.length];
  return { ...m, maxHP: pid === 'hazel' ? m.kidHP : m.adultHP };
}

function getMonsterHP(pid) {
  const m = dateSeededMonster(pid, todayKey());
  const dmg = (state.monsterDamage?.[pid]?.[todayKey()]) || 0;
  return Math.max(0, m.maxHP - dmg);
}

function monsterSectionHTML(pid) {
  const m = dateSeededMonster(pid, todayKey());
  const hp = getMonsterHP(pid);
  const dead = hp === 0;
  const pct = Math.round((hp / m.maxHP) * 100);
  const low = pct < 30;
  return `<div class="monster-section${dead ? ' monster-dead' : ''}">
    <div class="monster-name${dead ? ' defeated' : ''}">${dead ? '&#x2620;' : '&#x2694;'} ${m.name}</div>
    <div class="monster-sprite-wrap" id="msprite_${pid}">${spriteHTML(SPRITES[m.id], 3)}</div>
    <div class="hp-text">HP ${hp}/${m.maxHP}</div>
    <div class="hp-bar-outer"><div class="hp-bar-fill${low ? ' low' : ''}" style="width:${pct}%"></div></div>
  </div>`;
}

function todayKey() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function weekKey() { const d = new Date(); const s = new Date(d); s.setDate(d.getDate() - d.getDay()); return `${s.getFullYear()}-${s.getMonth()}-${s.getDate()}`; }
function todayDow() { return new Date().getDay(); }

let state = { points: { matt: 0, erin: 0, hazel: 0 }, dailyDone: {}, weeklyDone: {}, weekKey: weekKey(), todayKey: todayKey(), selected: null, history: [] };
try { const s = localStorage.getItem('chores_v3'); if (s) state = JSON.parse(s); } catch(e) {}

function runAutoResets() {
  let changed = false;
  const penaltyMsgs = [];
  if (state.todayKey !== todayKey()) {
    const yKey = state.todayKey;
    if (yKey) {
      PLAYERS.forEach(pl => {
        const m = dateSeededMonster(pl.id, yKey);
        const dmg = (state.monsterDamage?.[pl.id]?.[yKey]) || 0;
        if (dmg < m.maxHP) {
          const pKey = `${pl.id}_${yKey}`;
          if (!(state.monsterPenalties || {})[pKey]) {
            state.points[pl.id] = Math.max(0, (state.points[pl.id] || 0) - m.atk);
            if (!state.monsterPenalties) state.monsterPenalties = {};
            state.monsterPenalties[pKey] = true;
            if (!state.history) state.history = [];
            state.history.push({ type: 'penalty', player: pl.name, name: m.name, pts: m.atk });
            penaltyMsgs.push(`⚠ ${pl.name}'s ${m.name} attacked! -${m.atk} pts`);
          }
        }
      });
    }
    state.dailyDone = {}; state.todayKey = todayKey(); changed = true;
  }
  if (state.weekKey !== weekKey()) { state.weeklyDone = {}; state.weekKey = weekKey(); changed = true; }
  if (changed) save();
  return penaltyMsgs;
}

let currentTab = 'chores';
function save() { try { localStorage.setItem('chores_v3', JSON.stringify(state)); } catch(e) {} }
function getChoreClaimedBy(c) { return (c.freq === 'daily' ? state.dailyDone : state.weeklyDone)[c.id] || null; }
function ptsBadgeClass(p) { return p === 1 ? 'pts-1' : p === 2 ? 'pts-2' : p === 3 ? 'pts-3' : 'pts-5'; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(tab) {
  currentTab = tab;
  ['chores','rewards','history'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t === tab));
  renderContent();
}

function getChoresFor(pid) {
  const dow = todayDow();
  const chores = pid === 'hazel'
    ? ALL_CHORES.filter(c => c.who === 'all' || c.who === 'kids')
    : ALL_CHORES.filter(c => c.who === 'all' || c.who === 'adults');
  return chores.filter(c => c.dow === undefined || c.dow === dow);
}

function getRewardsFor(pid) {
  if (pid === 'hazel') return REWARDS.filter(r => r.who === 'all' || r.who === 'kids');
  return REWARDS.filter(r => r.who === 'all' || r.who === 'adults');
}

function renderPlayers() {
  document.getElementById('players').innerHTML = PLAYERS.map(p => `
    <div class="player-card ${state.selected === p.id ? 'active' : ''}" onclick="selectPlayer('${p.id}')">
      <div class="char-sprite">${spriteHTML(SPRITES['char_'+p.id], 3)}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-pts">${state.points[p.id] || 0} <span class="player-pts-label">pts</span></div>
      </div>
      ${monsterSectionHTML(p.id)}
    </div>`).join('');
}

function choreHTML(c) {
  const claimedBy = getChoreClaimedBy(c);
  const isDone = !!claimedBy;
  const dp = isDone ? PLAYERS.find(p => p.id === claimedBy) : null;
  return `<div class="chore ${isDone ? 'done' : ''}" onclick="claimChore('${c.id}')">
    <div class="chore-top"><i class="ti ${c.icon} chore-icon"></i><span class="pts-badge ${ptsBadgeClass(c.pts)}">+${c.pts}</span></div>
    <div class="chore-name">${c.name}</div>
    ${isDone ? `<div class="done-by"><i class="ti ti-check"></i> ${dp ? dp.name : 'done'}</div>` : ''}
  </div>`;
}

function renderContent() {
  const area = document.getElementById('tab-content');
  if (currentTab === 'chores') {
    if (!state.selected) { area.innerHTML = '<div class="no-select">Select a person above to see their chores.</div>'; return; }
    const daily = getChoresFor(state.selected).filter(c => c.freq === 'daily');
    const weekly = getChoresFor(state.selected).filter(c => c.freq === 'weekly');
    if (!weekly.length) {
      area.innerHTML = `
        <div class="section-label">Daily chores <span class="reset-info">— resets at midnight</span></div>
        <div class="chores">${daily.map(choreHTML).join('')}</div>`;
    } else {
      area.innerHTML = `<div class="chore-sections">
        <div>
          <div class="section-label">Daily chores <span class="reset-info">— resets at midnight</span></div>
          <div class="chores">${daily.map(choreHTML).join('')}</div>
        </div>
        <div>
          <div class="section-label">Weekly chores <span class="reset-info">— resets Sunday midnight</span></div>
          <div class="chores">${weekly.map(choreHTML).join('')}</div>
        </div>
      </div>`;
    }
  } else if (currentTab === 'rewards') {
    if (!state.selected) { area.innerHTML = '<div class="no-select">Select a person above to browse rewards.</div>'; return; }
    const player = PLAYERS.find(p => p.id === state.selected);
    const pts = state.points[state.selected] || 0;
    area.innerHTML = `
      <div class="section-label">${player.name} has ${pts} pts — tap a reward to redeem</div>
      <div class="rewards">${getRewardsFor(state.selected).map(r => `
        <div class="reward ${pts < r.cost ? 'cant-afford' : ''}" onclick="redeemReward('${r.id}')">
          <div class="reward-top"><i class="ti ${r.icon} reward-icon"></i><span class="cost-badge">${r.cost} pts</span></div>
          <div class="reward-name">${r.name}</div>
          <div class="reward-desc">${r.desc}</div>
        </div>`).join('')}</div>`;
  } else {
    const hist = (state.history || []).slice().reverse();
    area.innerHTML = `<div class="section-label">Recent activity</div>` +
      (hist.length === 0 ? '<div class="empty">No activity yet.</div>' :
      `<div class="redeemed-list">${hist.slice(0,40).map(h => {
        const icon = h.type === 'chore' ? 'ti-check' : h.type === 'penalty' ? 'ti-skull' : 'ti-gift';
        const action = h.type === 'chore' ? 'completed' : h.type === 'penalty' ? 'attacked by' : 'redeemed';
        const pts = h.type === 'chore' ? `(+${h.pts} pts)` : `(-${h.pts} pts)`;
        return `<div class="redeemed-item">
          <i class="ti ${icon}"></i>
          <span><span class="redeemed-name">${h.player}</span> ${action} <span class="redeemed-name">${h.name}</span> ${pts}</span>
        </div>`;
      }).join('')}</div>`);
  }
}

function selectPlayer(id) { state.selected = state.selected === id ? null : id; save(); renderPlayers(); renderContent(); }

function claimChore(choreId) {
  if (!state.selected) return;
  const chore = ALL_CHORES.find(c => c.id === choreId);
  const store = chore.freq === 'daily' ? state.dailyDone : state.weeklyDone;
  if (store[choreId]) return;
  const player = PLAYERS.find(p => p.id === state.selected);
  store[choreId] = state.selected;
  state.points[state.selected] = (state.points[state.selected] || 0) + chore.pts;
  if (!state.history) state.history = [];
  state.history.push({ type: 'chore', player: player.name, name: chore.name, pts: chore.pts });
  if (!state.monsterDamage) state.monsterDamage = {};
  if (!state.monsterDamage[state.selected]) state.monsterDamage[state.selected] = {};
  const tKey = todayKey();
  const prevDmg = state.monsterDamage[state.selected][tKey] || 0;
  state.monsterDamage[state.selected][tKey] = prevDmg + chore.pts;
  const m = dateSeededMonster(state.selected, tKey);
  const hp = Math.max(0, m.maxHP - state.monsterDamage[state.selected][tKey]);
  const justKilled = hp === 0 && prevDmg < m.maxHP;
  const msg = justKilled
    ? `⚔ ${player.name} slew the ${m.name}! +${chore.pts} pts`
    : `${player.name} hits ${m.name} for ${chore.pts}! HP: ${hp}/${m.maxHP}`;
  save(); showToast(msg);
  renderPlayers(); renderContent();
}

function redeemReward(rewardId) {
  if (!state.selected) return;
  const reward = REWARDS.find(r => r.id === rewardId);
  const player = PLAYERS.find(p => p.id === state.selected);
  const pts = state.points[state.selected] || 0;
  if (pts < reward.cost) return;
  if (!confirm(`Redeem "${reward.name}" for ${reward.cost} pts?`)) return;
  state.points[state.selected] -= reward.cost;
  if (!state.history) state.history = [];
  state.history.push({ type: 'reward', player: player.name, name: reward.name, pts: reward.cost });
  save(); showToast(`${player.name} redeemed: ${reward.name}!`);
  renderPlayers(); renderContent();
}

function resetWeek() {
  if (!confirm('Reset all chores and points? History will be kept.')) return;
  state.points = { matt: 0, erin: 0, hazel: 0 };
  state.dailyDone = {}; state.weeklyDone = {};
  save(); renderPlayers(); renderContent();
}

const _penalties = runAutoResets();
renderPlayers(); renderContent();
if (_penalties.length) setTimeout(() => showToast(_penalties[0]), 800);
</script>
</body>
</html>
